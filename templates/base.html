<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Tracker</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav>
  <span class="nav-brand">My Tracker</span>
  <div class="nav-links">
    <a href="/gym"        {% if request.path.startswith('/gym')        %}class="active"{% endif %}>Gym</a>
    <a href="/attendance" {% if request.path.startswith('/attendance') %}class="active"{% endif %}>Attendance</a>
    <a href="/study"      {% if request.path.startswith('/study')      %}class="active"{% endif %}>Study</a>
  </div>
</nav>

<main>
  {% block content %}
  {% endblock %}
</main>

</body>
</html>
