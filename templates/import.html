{% extends "base.html" %}
{% block content %}
<header class="page-head">
  <div>
    <p class="eyebrow">Move data</p>
    <h1>Import Backup</h1>
  </div>
</header>

<section class="panel">
  <h2>Upload TrackOS Backup</h2>
  <form method="POST" enctype="multipart/form-data">
    <label>Backup JSON
      <input type="file" name="backup" accept="application/json,.json" required>
    </label>
    <button type="submit">Import Backup</button>
  </form>
</section>
{% endblock %}
