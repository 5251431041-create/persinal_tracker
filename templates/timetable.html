{% extends "base.html" %}
{% block content %}
<header class="page-head"><h1>Timetable Setup</h1></header>
<section class="panel">
  <h2>Classes Per Day</h2>
  <form method="POST" action="{{ url_for('timetable') }}"><div class="day-grid">{% for day in days %}<label>{{ day }}<input type="number" name="{{ day }}" value="{{ timetable[day] }}" min="0" max="20"></label>{% endfor %}</div><button type="submit">Save Timetable</button></form>
</section>
<a href="{{ url_for('attendance') }}" class="back-link">Back to Attendance</a>
{% endblock %}
